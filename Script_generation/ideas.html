<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonify Idea Explorer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;700&display=swap');

        :root {
            --ink: #0b0d1a;
            --paper: #f7f3ee;
            --sun: #ffcc5c;
            --coral: #ff6f59;
            --teal: #2ec4b6;
            --blue: #2d4cff;
            --shadow: 0 30px 70px rgba(11, 13, 26, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: radial-gradient(circle at 10% 10%, #fff1d6 0%, #f7f3ee 45%, #e7f4f2 100%);
            color: var(--ink);
            min-height: 100vh;
            padding: 28px;
        }

        .grain {
            position: fixed;
            inset: 0;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140" viewBox="0 0 140 140"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" stitchTiles="stitch"/></filter><rect width="140" height="140" filter="url(%23n)" opacity="0.05"/></svg>');
            pointer-events: none;
            mix-blend-mode: multiply;
        }

        .layout {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            gap: 24px;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        .hero h1 {
            font-family: 'Fraunces', serif;
            font-size: clamp(2.4rem, 4vw, 3.6rem);
            line-height: 1.05;
        }

        .hero p {
            max-width: 560px;
            font-size: 1.05rem;
            color: rgba(11, 13, 26, 0.7);
        }

        .hero-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid rgba(11, 13, 26, 0.15);
            background: #fff;
            color: var(--ink);
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .pill:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(11, 13, 26, 0.12);
        }

        .card {
            background: #fff;
            border-radius: 24px;
            padding: 28px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .card::after {
            content: '';
            position: absolute;
            top: -120px;
            right: -120px;
            width: 240px;
            height: 240px;
            background: radial-gradient(circle, rgba(46, 196, 182, 0.25), transparent 70%);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        label {
            font-weight: 600;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(11, 13, 26, 0.2);
            font-size: 1rem;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(45, 76, 255, 0.15);
        }

        .cta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(135deg, var(--coral), var(--sun));
            color: #111;
            border: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 32px rgba(255, 111, 89, 0.25);
        }

        .secondary-btn {
            background: #fff;
            border: 1px solid rgba(11, 13, 26, 0.2);
            color: var(--ink);
        }

        .results {
            display: grid;
            gap: 16px;
            margin-top: 16px;
        }

        .result-card {
            background: var(--paper);
            border-radius: 18px;
            padding: 18px;
            border: 1px solid rgba(11, 13, 26, 0.08);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .idea-line {
            font-size: 1.05rem;
            font-weight: 600;
            color: rgba(11, 13, 26, 0.85);
            line-height: 1.4;
        }

        .result-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .mini-btn {
            background: var(--blue);
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .link-btn {
            background: transparent;
            border: 1px solid rgba(11, 13, 26, 0.2);
            color: var(--ink);
            text-decoration: none;
        }

        .status {
            margin-top: 16px;
            font-weight: 600;
            color: var(--ink);
        }

        .status.error {
            color: #b00020;
        }

        .answer-box {
            margin-top: 16px;
            padding: 16px;
            border-radius: 16px;
            background: rgba(46, 196, 182, 0.12);
        }

        @media (max-width: 900px) {
            body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="grain"></div>
    <div class="layout">
        <header class="hero">
            <div>
                <h1>Moonify Idea Explorer</h1>
                <p>Tell us what you want ideas for. We will search recent hot topics and return copy-ready topic descriptions you can paste into the script generator.</p>
            </div>
            <div class="hero-actions">
                <a class="pill" href="/script" id="scriptLink">Open Script Generator</a>
                <span class="pill">Powered by Tavily Search</span>
            </div>
        </header>

        <section class="card">
            <h2>Find trending topics</h2>
            <div class="form-grid">
                <div>
                    <label for="query">Topic or niche</label>
                    <input type="text" id="query" placeholder="e.g., sustainable fashion, AI for education" required>
                </div>
                <div>
                    <label for="timeRange">Time range</label>
                    <select id="timeRange">
                        <option value="day">Last 24 hours</option>
                        <option value="week" selected>Last 7 days</option>
                        <option value="month">Last 30 days</option>
                        <option value="year">Last 12 months</option>
                    </select>
                </div>
                <div>
                    <label for="startDate">Start date (optional)</label>
                    <input type="date" id="startDate">
                </div>
                <div>
                    <label for="endDate">End date (optional)</label>
                    <input type="date" id="endDate">
                </div>
                <div>
                    <label for="maxResults">Results</label>
                    <select id="maxResults">
                        <option value="6">6</option>
                        <option value="8" selected>8</option>
                        <option value="10">10</option>
                        <option value="12">12</option>
                    </select>
                </div>
            </div>
            <div class="cta">
                <button class="btn" id="searchBtn">Search hot topics</button>
                <button class="btn secondary-btn" id="clearBtn">Clear</button>
            </div>
            <div class="status" id="status"></div>
            <div class="answer-box" id="answerBox" style="display: none;"></div>
            <div class="results" id="results"></div>
        </section>
    </div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusEl = document.getElementById('status');
        const resultsEl = document.getElementById('results');
        const answerBox = document.getElementById('answerBox');
        const scriptLink = document.getElementById('scriptLink');

        function getScriptUrl(topicText = '') {
            const baseUrl = window.location.origin.startsWith('file') ? 'index.html' : '/script';
            if (topicText) {
                return `${baseUrl}?topic=${encodeURIComponent(topicText)}`;
            }
            return baseUrl;
        }

        scriptLink.href = getScriptUrl();

        function setStatus(message, isError = false) {
            statusEl.textContent = message;
            statusEl.classList.toggle('error', isError);
        }

        function clearResults() {
            resultsEl.innerHTML = '';
            answerBox.style.display = 'none';
            answerBox.textContent = '';
            setStatus('');
        }

        clearBtn.addEventListener('click', () => {
            document.getElementById('query').value = '';
            clearResults();
        });

        function toOneLine(text) {
            const clean = text.replace(/\s+/g, ' ').trim();
            if (clean.length <= 140) {
                return clean;
            }
            return `${clean.slice(0, 137)}...`;
        }

        searchBtn.addEventListener('click', async () => {
            const query = document.getElementById('query').value.trim();
            const timeRange = document.getElementById('timeRange').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const maxResults = document.getElementById('maxResults').value;

            if (!query) {
                setStatus('Please enter a topic or niche.', true);
                return;
            }

            if ((startDate && !endDate) || (!startDate && endDate)) {
                setStatus('Please provide both a start and end date.', true);
                return;
            }

            clearResults();
            setStatus('Searching hot topics...');

            try {
                const response = await fetch('http://localhost:5000/search-topics', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query,
                        time_range: timeRange,
                        start_date: startDate,
                        end_date: endDate,
                        max_results: maxResults
                    })
                });

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || 'Search failed');
                }

                if (data.answer) {
                    answerBox.style.display = 'block';
                    answerBox.textContent = data.answer;
                }

                if (!data.topics.length) {
                    setStatus('No results found. Try a different query or time range.', true);
                    return;
                }

                data.topics.forEach((topic) => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    const ideaText = topic.title || topic.description || 'Untitled topic';
                    const summarySource = `${topic.title || ''} ${topic.description || ''}`.trim();
                    const oneLine = toOneLine(ideaText);
                    card.innerHTML = `
                        <div class="idea-line">${oneLine}</div>
                        <div class="result-actions">
                            <button class="mini-btn" data-use="${encodeURIComponent(oneLine)}" data-summary="${encodeURIComponent(summarySource)}">Use idea</button>
                            <a class="mini-btn link-btn" href="${topic.url}" target="_blank" rel="noopener">View source</a>
                        </div>
                    `;
                    resultsEl.appendChild(card);
                });

                setStatus(`Found ${data.topics.length} hot topics.`);
            } catch (error) {
                setStatus(error.message, true);
            }
        });

        resultsEl.addEventListener('click', async (event) => {
            if (event.target.matches('[data-use]')) {
                const button = event.target;
                const topicText = decodeURIComponent(button.getAttribute('data-use'));
                const summarySource = decodeURIComponent(button.getAttribute('data-summary') || topicText);

                button.disabled = true;
                setStatus('Summarizing idea...', false);

                try {
                    const response = await fetch('http://localhost:5000/summarize-idea', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: summarySource })
                    });

                    const data = await response.json();

                    if (!data.success) {
                        throw new Error(data.error || 'Summarization failed');
                    }

                    const summary = (data.summary || topicText).replace(/\s*\n\s*/g, ' ').trim();
                    window.location.href = getScriptUrl(summary || topicText);
                } catch (error) {
                    setStatus(error.message, true);
                    button.disabled = false;
                }
            }
        });
    </script>
</body>
</html>
